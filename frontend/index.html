<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f7f9" />
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <style>
      html,
      body,
      #root {
        min-height: 100vh;
        background: var(--app-chrome-bg, #f4f7f9);
      }

      @supports (min-height: 100dvh) {
        html,
        body,
        #root {
          min-height: 100dvh;
        }
      }

      /*
       * WebViewGold / mobile safe-area paint strip:
       * keep the top inset filled with app chrome color even when native status
       * bar overlays content.
       */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: env(safe-area-inset-top, 0px);
        background: var(--app-chrome-bg, #f4f7f9);
        pointer-events: none;
        z-index: 2147483647;
      }
    </style>
    <title>Clean Motion Ghana</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
