# Development override file
# Use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  csms-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    command: npm run start:dev

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Vite uses VITE_*; omit API/WS to rely on /api and /ws via proxy (see vite.config.ts + DEV_API_PROXY_TARGET in base compose)
      CHOKIDAR_USEPOLLING: "true"  # For file watching on Mac
    command: sh -c "npm install && npm start"

