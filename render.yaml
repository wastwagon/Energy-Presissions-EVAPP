# Custom domains (api.cleanmotion…, cleanmotion…) are attached in the Render dashboard
# on existing services. Omitting `domains` here avoids "domain already taken" when you
# apply or sync a Blueprint alongside manually configured hostnames.

databases:
  # PostgreSQL Database
  - name: ev-billing-postgres
    plan: free
    databaseName: ev_billing_db
    postgresMajorVersion: "15"

services:
  # Render Key Value (Redis-compatible) — OCPP pub/sub + vendor events (embedded in API)
  - type: keyvalue
    name: ev-billing-redis
    plan: starter
    ipAllowList: []

  # Backend API (NestJS) + embedded OCPP 1.6J WebSocket at wss://<this-host>/ocpp
  - type: web
    name: ev-billing-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ev-billing-postgres
          property: connectionString
      - key: FRONTEND_URL
        value: https://cleanmotion.energyprecisions.com
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ev-billing-redis
          property: connectionString
      - key: MINIO_ENDPOINT
        value: s3.amazonaws.com
      - key: MINIO_PORT
        value: 443
      - key: MINIO_EXTERNAL_PORT
        value: 443
      - key: MINIO_ACCESS_KEY
        value: minioadmin
      - key: MINIO_SECRET_KEY
        value: minioadmin123
      - key: MINIO_BUCKET
        value: ev-billing
      - key: MINIO_USE_SSL
        value: "true"
      # Public base URL for object keys (branding + vendor logos). Set in dashboard if bucket is not path-style public.
      - key: MINIO_PUBLIC_BASE_URL
        sync: false
      # Customers from register / social sign-in when no vendorId is sent (single-tenant default).
      - key: DEFAULT_CUSTOMER_VENDOR_ID
        value: "1"
      - key: JWT_SECRET
        sync: false
      - key: SERVICE_TOKEN
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        value: https://api.cleanmotion.energyprecisions.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Optional: comma-separated charge point IDs blocked from OCPP re-registration (simulators reconnecting after admin delete).
      - key: BLOCKED_CHARGE_POINT_IDS
        sync: false
      - key: LOG_RAW_FRAMES
        value: "false"
      # Optional: "all" = log every HTTP request; unset = log only 4xx/5xx (helps Render Logs when debugging 502 vs CORS).
      - key: LOG_HTTP_REQUESTS
        sync: false
      # API docs: default off in production; set to "true" to expose /api/docs
      - key: ENABLE_SWAGGER
        value: "false"
    healthCheckPath: /health

  # Frontend (React + Vite)
  - type: web
    name: ev-billing-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile.prod
    dockerContext: ./frontend
    plan: starter
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://api.cleanmotion.energyprecisions.com/api
      - key: VITE_WS_URL
        value: wss://api.cleanmotion.energyprecisions.com/ws
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_PRIVACY_POLICY_URL
        value: https://cleanmotion.energyprecisions.com/privacy
      - key: VITE_TERMS_OF_SERVICE_URL
        value: https://cleanmotion.energyprecisions.com/terms
