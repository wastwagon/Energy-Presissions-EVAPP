databases:
  # PostgreSQL Database
  - name: ev-billing-postgres
    plan: free
    databaseName: ev_billing_db
    postgresMajorVersion: "15"

services:
  # Backend API (NestJS)
  - type: web
    name: ev-billing-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: ev-billing-postgres
          property: connectionString
      - key: FRONTEND_URL
        value: https://ev-billing-frontend.onrender.com
      # Redis is optional - app will use in-memory cache if not provided
      # - key: REDIS_URL
      #   value: redis://your-redis-url:6379
      - key: MINIO_ENDPOINT
        value: s3.amazonaws.com
      - key: MINIO_PORT
        value: 443
      - key: MINIO_EXTERNAL_PORT
        value: 443
      - key: MINIO_ACCESS_KEY
        value: minioadmin
      - key: MINIO_SECRET_KEY
        value: minioadmin123
      - key: MINIO_BUCKET
        value: ev-billing
      - key: MINIO_USE_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: SERVICE_TOKEN
        sync: false
      - key: OCPP_GATEWAY_URL
        fromService:
          type: web
          name: ev-billing-api
          property: host
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        fromService:
          type: web
          name: ev-billing-api
          property: host
      - key: GOOGLE_CLIENT_ID
        sync: false
    healthCheckPath: /health

  # Frontend (React + Vite)
  - type: web
    name: ev-billing-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile.prod
    dockerContext: ./frontend
    plan: starter
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://ev-billing-api.onrender.com/api
      - key: VITE_WS_URL
        value: wss://ev-billing-api.onrender.com/ws
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
