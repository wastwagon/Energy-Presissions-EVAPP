services:
  # PostgreSQL Database
  - type: postgresql
    name: ev-billing-postgres
    plan: starter  # Change to standard or pro for production
    databaseName: ev_billing_db
    user: evbilling
    # Password will be auto-generated by Render

  # Redis Cache
  - type: redis
    name: ev-billing-redis
    plan: starter  # Change to standard or pro for production
    maxmemoryPolicy: allkeys-lru

  # Backend API (NestJS)
  - type: web
    name: ev-billing-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter  # Change to standard or pro for production
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: ev-billing-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ev-billing-redis
          property: connectionString
      - key: MINIO_ENDPOINT
        value: ev-billing-minio.onrender.com  # Update after MinIO service is created
      - key: MINIO_PORT
        value: 9000
      - key: MINIO_EXTERNAL_PORT
        value: 443
      - key: MINIO_ACCESS_KEY
        sync: false  # Set in Render dashboard
      - key: MINIO_SECRET_KEY
        sync: false  # Set in Render dashboard
      - key: MINIO_BUCKET
        value: ev-billing
      - key: JWT_SECRET
        sync: false  # Set in Render dashboard - use a strong random string
      - key: SERVICE_TOKEN
        sync: false  # Set in Render dashboard - use a strong random string
      - key: OCPP_GATEWAY_URL
        fromService:
          type: web
          name: ev-billing-ocpp-gateway
          property: host
        value: https://ev-billing-ocpp-gateway.onrender.com
      - key: PAYSTACK_SECRET_KEY
        sync: false  # Set in Render dashboard
      - key: PAYSTACK_PUBLIC_KEY
        sync: false  # Set in Render dashboard
      - key: PAYSTACK_CALLBACK_URL
        fromService:
          type: web
          name: ev-billing-api
          property: host
        value: https://ev-billing-api.onrender.com/api/payments/verify
    healthCheckPath: /health

  # Frontend (React)
  - type: web
    name: ev-billing-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile.prod
    dockerContext: ./frontend
    plan: starter  # Change to standard or pro for production
    envVars:
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: ev-billing-api
          property: host
        value: https://ev-billing-api.onrender.com/api
      - key: REACT_APP_WS_URL
        fromService:
          type: web
          name: ev-billing-ocpp-gateway
          property: host
        value: wss://ev-billing-ocpp-gateway.onrender.com/ocpp

  # OCPP Gateway (WebSocket Server) - Web Service for WebSocket support
  - type: web
    name: ev-billing-ocpp-gateway
    runtime: docker
    dockerfilePath: ./ocpp-gateway/Dockerfile
    dockerContext: ./ocpp-gateway
    plan: starter  # Change to standard or pro for production
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 9000
      - key: REDIS_URL
        fromService:
          type: redis
          name: ev-billing-redis
          property: connectionString
      - key: CSMS_API_URL
        fromService:
          type: web
          name: ev-billing-api
          property: host
        value: https://ev-billing-api.onrender.com
      - key: SERVICE_TOKEN
        sync: false  # Must match SERVICE_TOKEN in API service
      - key: LOG_RAW_FRAMES
        value: false
    healthCheckPath: /health

  # MinIO Object Storage (Optional - can use external S3 instead)
  - type: web
    name: ev-billing-minio
    runtime: docker
    image: minio/minio:latest
    plan: starter  # Change to standard or pro for production
    envVars:
      - key: MINIO_ROOT_USER
        sync: false  # Set in Render dashboard
      - key: MINIO_ROOT_PASSWORD
        sync: false  # Set in Render dashboard
    dockerCommand: server /data --console-address ":9001"
    healthCheckPath: /minio/health/live
