# Alternate blueprint (Redis + MinIO). OCPP is embedded in ev-billing-api (same host as /ocpp).

databases:
  # PostgreSQL Database
  - name: ev-billing-postgres
    plan: free
    databaseName: ev_billing_db
    postgresMajorVersion: "15"

services:
  # Render Key Value (Redis-compatible)
  - type: keyvalue
    name: ev-billing-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # Backend API (NestJS) + OCPP WebSocket at /ocpp
  - type: web
    name: ev-billing-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ev-billing-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ev-billing-redis
          property: connectionString
      - key: MINIO_ENDPOINT
        value: ev-billing-minio.onrender.com
      - key: MINIO_PORT
        value: 9000
      - key: MINIO_EXTERNAL_PORT
        value: 443
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: ev-billing
      - key: MINIO_USE_SSL
        value: "true"
      - key: MINIO_PUBLIC_BASE_URL
        sync: false
      - key: DEFAULT_CUSTOMER_VENDOR_ID
        value: "1"
      - key: JWT_SECRET
        sync: false
      - key: SERVICE_TOKEN
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        value: https://ev-billing-api.onrender.com/api/payments/verify
      - key: ENABLE_SWAGGER
        value: "false"
    healthCheckPath: /health

  # Frontend (React)
  - type: web
    name: ev-billing-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile.prod
    dockerContext: ./frontend
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://ev-billing-api.onrender.com/api
      - key: VITE_WS_URL
        value: wss://ev-billing-api.onrender.com/ws

  # MinIO Object Storage
  - type: web
    name: ev-billing-minio
    runtime: docker
    dockerfilePath: ./minio/Dockerfile
    dockerContext: ./minio
    plan: starter
    envVars:
      - key: MINIO_ROOT_USER
        sync: false
      - key: MINIO_ROOT_PASSWORD
        sync: false
    healthCheckPath: /minio/health/live

