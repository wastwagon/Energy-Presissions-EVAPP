services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ev-billing-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evbilling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evbilling_password}
      POSTGRES_DB: ${POSTGRES_DB:-ev_billing_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evbilling}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ev-billing-network
    restart: unless-stopped

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: ev-billing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ev-billing-network
    restart: unless-stopped

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:latest
    container_name: ev-billing-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ev-billing-network
    restart: unless-stopped

  # OCPP Gateway (Node.js + TypeScript WebSocket Server)
  ocpp-gateway:
    build:
      context: ./ocpp-gateway
      dockerfile: Dockerfile.dev
    container_name: ev-billing-ocpp-gateway
    environment:
      NODE_ENV: development
      PORT: 9000
      REDIS_URL: redis://redis:6379
      CSMS_API_URL: http://csms-api:3000
      SERVICE_TOKEN: ${SERVICE_TOKEN:-your-service-token-change-in-production}
      LOG_RAW_FRAMES: ${LOG_RAW_FRAMES:-true}
    ports:
      - "9000:9000"
    volumes:
      - ./ocpp-gateway:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
      csms-api:
        condition: service_started
    networks:
      - ev-billing-network
    restart: unless-stopped
    command: npm run dev

  # CSMS API (NestJS + TypeScript)
  csms-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ev-billing-csms-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-evbilling}:${POSTGRES_PASSWORD:-evbilling_password}@postgres:5432/${POSTGRES_DB:-ev_billing_db}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ev-billing
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_in_production}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-your-service-token-change-in-production}
      # Payment Gateway (example)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ev-billing-network
    restart: unless-stopped
    command: npm run start:dev

  # Frontend (React + TypeScript)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ev-billing-frontend
    environment:
      NODE_ENV: development
      PORT: 3001
      REACT_APP_API_URL: http://localhost/api
      REACT_APP_WS_URL: ws://localhost/ocpp
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - csms-api
      - ocpp-gateway
    networks:
      - ev-billing-network
    restart: unless-stopped
    command: npm start

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ev-billing-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # For TLS (optional)
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - csms-api
      - ocpp-gateway
      - frontend
    networks:
      - ev-billing-network
    restart: unless-stopped

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ev-billing-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@evbilling.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - ev-billing-network
    profiles:
      - tools
    restart: unless-stopped

  # Optional: Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ev-billing-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - ev-billing-network
    profiles:
      - tools
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  ev-billing-network:
    driver: bridge



